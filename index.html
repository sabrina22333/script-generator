<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短影音腳本生成器</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--bg2:#13131a;--bg3:#1c1c26;--border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);--text:#f0eff8;--text2:#9896b0;--text3:#5e5c78;--accent2:#a594ff;--accent-bg:rgba(124,106,247,0.12);--accent-border:rgba(124,106,247,0.4);--green:#4ade80}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.page{max-width:680px;margin:0 auto;padding:3rem 1.5rem 5rem}
.header{text-align:center;margin-bottom:3rem}
.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:20px;border:1px solid var(--accent-border);background:var(--accent-bg);font-size:12px;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;margin-bottom:1.25rem;font-weight:500}
.dot{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
h1{font-size:clamp(28px,5vw,42px);font-weight:900;letter-spacing:-1.5px;line-height:1.15;margin-bottom:0.75rem}
h1 span{background:linear-gradient(135deg,var(--accent2),#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:14px;color:var(--text2);font-weight:300}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:1.75rem;margin-bottom:1rem}
.label{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 16px;border-radius:100px;font-size:13px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;transition:all 0.2s;font-family:'Noto Sans TC',sans-serif;user-select:none}
.chip:hover{border-color:var(--border2);color:var(--text)}
.chip.active{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent2);font-weight:500}
.topic-wrap{position:relative}
textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:14px;font-family:'Noto Sans TC',sans-serif;font-weight:300;padding:14px 16px;resize:none;height:88px;line-height:1.7;outline:none;transition:border-color 0.2s}
textarea::placeholder{color:var(--text3)}
textarea:focus{border-color:var(--accent-border)}
.char{position:absolute;right:12px;bottom:10px;font-size:11px;color:var(--text3)}
.gen-btn{width:100%;padding:15px;border-radius:14px;border:none;background:linear-gradient(135deg,#6c5ce7,#a594ff);color:#fff;font-size:15px;font-weight:700;font-family:'Noto Sans TC',sans-serif;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:1rem}
.gen-btn:hover{transform:translateY(-1px);box-shadow:0 8px 32px rgba(108,92,231,0.4)}
.gen-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;box-shadow:none}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.result-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-top:1rem;display:none}
.result-card.visible{display:block}
.result-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--bg3)}
.result-tag{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--green)}
.tag-dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
.copy-btn{padding:5px 12px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:12px;font-family:'Noto Sans TC',sans-serif;cursor:pointer}
.result-body{padding:1.5rem 1.75rem}
#result-text{font-size:14px;line-height:2;color:var(--text);white-space:pre-wrap;font-weight:300;min-height:60px}
.footer{text-align:center;margin-top:3rem;font-size:12px;color:var(--text3)}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <div class="badge"><div class="dot"></div>AI 腳本生成器</div>
    <h1>30–50 秒<br><span>爆款腳本</span><br>即選即用</h1>
    <p class="subtitle">選好設定 · 輸入主題 · 一鍵生成高完播率腳本</p>
  </div>
  <div class="card">
    <div class="label">帳號類型</div>
    <div class="chips">
      <div class="chip active" data-group="type" data-val="AI自媒體">AI 自媒體</div>
      <div class="chip" data-group="type" data-val="中古車業務">中古車業務</div>
    </div>
  </div>
  <div class="card">
    <div class="label">發布平台</div>
    <div class="chips">
      <div class="chip active" data-group="platform" data-val="Instagram Reels">Instagram Reels</div>
      <div class="chip" data-group="platform" data-val="TikTok/抖音">TikTok / 抖音</div>
    </div>
  </div>
  <div class="card">
    <div class="label">說話風格</div>
    <div class="chips">
      <div class="chip active" data-group="style" data-val="輕鬆幽默">輕鬆幽默</div>
      <div class="chip" data-group="style" data-val="專業有力">專業有力</div>
    </div>
  </div>
  <div class="card">
    <div class="label">影片主題 / 關鍵字</div>
    <div class="topic-wrap">
      <textarea id="topic" placeholder="例：我一個月賣了幾台車、第一次買中古車要注意什麼…" maxlength="200" oninput="document.getElementById('char').textContent=this.value.length+' / 200'"></textarea>
      <span class="char" id="char">0 / 200</span>
    </div>
  </div>
  <button class="gen-btn" id="btn" onclick="generate()">
    <span id="btn-text">✦ 立即生成腳本</span>
  </button>
  <div class="result-card" id="result-card">
    <div class="result-header">
      <div class="result-tag" id="result-tag"><div class="tag-dot"></div>生成完成</div>
      <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('result-text').textContent).then(()=>{this.textContent='已複製！';setTimeout(()=>this.textContent='複製全文',2000)})">複製全文</button>
    </div>
    <div class="result-body"><div id="result-text"></div></div>
  </div>
  <div class="footer">由 AI 驅動 · 腳本僅供參考，建議加入個人風格後使用</div>
</div>
<script>
const sel={type:'AI自媒體',platform:'Instagram Reels',style:'輕鬆幽默'};
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll(`.chip[data-group="${c.dataset.group}"]`).forEach(x=>x.classList.remove('active'));
  c.classList.add('active');
  sel[c.dataset.group]=c.dataset.val;
}));
async function generate(){
  const topic=document.getElementById('topic').value.trim();
  if(!topic){document.getElementById('topic').style.borderColor='#f87171';setTimeout(()=>document.getElementById('topic').style.borderColor='',1500);return;}
  const btn=document.getElementById('btn');
  btn.disabled=true;
  document.getElementById('btn-text').textContent='生成中…';
  const rc=document.getElementById('result-card');
  const rt=document.getElementById('result-text');
  const tag=document.getElementById('result-tag');
  rc.classList.add('visible');
  rt.textContent='';
  tag.innerHTML='<div class="tag-dot" style="background:var(--accent2)"></div> 生成中';
  tag.style.color='var(--accent2)';
  try{
    const res=await fetch('/api/generate',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:sel.type,platform:sel.platform,style:sel.style,topic})});
    const data=await res.json();
    rt.textContent=data.result||'生成失敗，請再試一次。';
    tag.innerHTML='<div class="tag-dot"></div> 生成完成';
    tag.style.color='var(--green)';
  }catch(e){
    rt.textContent='發生錯誤，請稍後再試。';
    tag.innerHTML='<div class="tag-dot" style="background:#f87171"></div> 發生錯誤';
    tag.style.color='#f87171';
  }
  btn.disabled=false;
  document.getElementById('btn-text').textContent='✦ 再生成一次';
}
</script>
</body>
</html>
