<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>短影音腳本生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #13131a;
    --bg3: #1c1c26;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0eff8;
    --text2: #9896b0;
    --text3: #5e5c78;
    --accent: #7c6af7;
    --accent2: #a594ff;
    --accent-bg: rgba(124,106,247,0.12);
    --accent-border: rgba(124,106,247,0.4);
    --green: #4ade80;
    --green-bg: rgba(74,222,128,0.1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 3rem 1.5rem 5rem;
  }

  /* header */
  .header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeUp 0.6s ease both;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--accent-border);
    background: var(--accent-bg);
    font-size: 12px;
    color: var(--accent2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1.25rem;
    font-weight: 500;
  }

  .badge-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(28px, 5vw, 42px);
    font-weight: 900;
    letter-spacing: -1.5px;
    line-height: 1.15;
    color: var(--text);
    margin-bottom: 0.75rem;
  }

  h1 span {
    background: linear-gradient(135deg, var(--accent2), #c4b5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 14px;
    color: var(--text2);
    font-weight: 300;
    letter-spacing: 0.3px;
  }

  /* card */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 1.75rem;
    margin-bottom: 1rem;
    animation: fadeUp 0.6s ease both;
  }

  .card:nth-child(2) { animation-delay: 0.1s; }
  .card:nth-child(3) { animation-delay: 0.15s; }
  .card:nth-child(4) { animation-delay: 0.2s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 12px;
  }

  /* chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 400;
    border: 1px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: 'Noto Sans TC', sans-serif;
    user-select: none;
  }

  .chip:hover {
    border-color: var(--border2);
    color: var(--text);
  }

  .chip.active {
    background: var(--accent-bg);
    border-color: var(--accent-border);
    color: var(--accent2);
    font-weight: 500;
  }

  /* textarea */
  .topic-wrap { position: relative; }

  textarea {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    padding: 14px 16px;
    resize: none;
    height: 88px;
    line-height: 1.7;
    transition: border-color 0.2s;
    outline: none;
  }

  textarea::placeholder { color: var(--text3); }
  textarea:focus { border-color: var(--accent-border); }

  .char-count {
    position: absolute;
    right: 12px;
    bottom: 10px;
    font-size: 11px;
    color: var(--text3);
  }

  /* generate button */
  .gen-btn {
    width: 100%;
    padding: 15px;
    border-radius: 14px;
    border: none;
    background: linear-gradient(135deg, #6c5ce7, #a594ff);
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans TC', sans-serif;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 1rem;
    position: relative;
    overflow: hidden;
  }

  .gen-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .gen-btn:hover::before { opacity: 1; }
  .gen-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(108,92,231,0.4); }
  .gen-btn:active { transform: scale(0.99); }
  .gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

  /* spinner */
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* result */
  .result-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    margin-top: 1rem;
    animation: fadeUp 0.4s ease both;
    display: none;
  }

  .result-card.visible { display: block; }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }

  .result-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--green);
  }

  .result-tag-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
  }

  .copy-btn {
    padding: 5px 12px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--text2);
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }

  .copy-btn:hover {
    background: var(--bg);
    color: var(--text);
  }

  .result-body {
    padding: 1.5rem 1.75rem;
  }

  #result-text {
    font-size: 14px;
    line-height: 2;
    color: var(--text);
    white-space: pre-wrap;
    font-weight: 300;
    min-height: 60px;
  }

  /* streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: var(--accent2);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* footer */
  .footer {
    text-align: center;
    margin-top: 3rem;
    font-size: 12px;
    color: var(--text3);
    animation: fadeUp 0.6s ease 0.4s both;
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  @media (max-width: 480px) {
    .page { padding: 2rem 1rem 4rem; }
    .card { padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="header">
    <div class="badge">
      <div class="badge-dot"></div>
      AI 腳本生成器
    </div>
    <h1>60–90 秒<br><span>爆款腳本</span><br>即選即用</h1>
    <p class="subtitle">選好設定 · 輸入主題 · 一鍵生成高完播率腳本</p>
  </div>

  <div class="card">
    <div class="section-label">帳號類型</div>
    <div class="chips">
      <div class="chip active" data-group="type" data-val="AI自媒體">AI 自媒體</div>
      <div class="chip" data-group="type" data-val="中古車業務">中古車業務</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">發布平台</div>
    <div class="chips">
      <div class="chip active" data-group="platform" data-val="Instagram Reels">Instagram Reels</div>
      <div class="chip" data-group="platform" data-val="TikTok/抖音">TikTok / 抖音</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">說話風格</div>
    <div class="chips">
      <div class="chip active" data-group="style" data-val="輕鬆幽默">輕鬆幽默</div>
      <div class="chip" data-group="style" data-val="專業有力">專業有力</div>
    </div>
  </div>

  <div class="card">
    <div class="section-label">影片主題 / 關鍵字</div>
    <div class="topic-wrap">
      <textarea id="topic-input" placeholder="例：我一個月賣了幾台車、選 AI 工具的三個坑、第一次買中古車要注意什麼…" maxlength="200" oninput="updateCount()"></textarea>
      <span class="char-count" id="char-count">0 / 200</span>
    </div>
  </div>

  <button class="gen-btn" id="gen-btn" onclick="generate()">
    <svg id="btn-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M8 1.5L9.5 6H14L10.5 9L11.5 13.5L8 11L4.5 13.5L5.5 9L2 6H6.5L8 1.5Z" fill="white"/>
    </svg>
    <span id="btn-text">立即生成腳本</span>
  </button>

  <div class="result-card" id="result-card">
    <div class="result-header">
      <div class="result-tag">
        <div class="result-tag-dot"></div>
        生成完成
      </div>
      <button class="copy-btn" onclick="copyResult()">複製全文</button>
    </div>
    <div class="result-body">
      <div id="result-text"></div>
    </div>
  </div>

  <div class="footer">由 Claude AI 驅動 · 腳本僅供參考，建議加入個人風格後使用</div>

</div>

<script>
const selections = { type: 'AI自媒體', platform: 'Instagram Reels', style: '輕鬆幽默' };

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const g = chip.dataset.group;
    document.querySelectorAll(`.chip[data-group="${g}"]`).forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    selections[g] = chip.dataset.val;
  });
});

function updateCount() {
  const v = document.getElementById('topic-input').value.length;
  document.getElementById('char-count').textContent = v + ' / 200';
}

async function generate() {
  const topic = document.getElementById('topic-input').value.trim();
  if (!topic) {
    document.getElementById('topic-input').focus();
    document.getElementById('topic-input').style.borderColor = '#f87171';
    setTimeout(() => document.getElementById('topic-input').style.borderColor = '', 1500);
    return;
  }

  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  document.getElementById('btn-icon').outerHTML = '<div class="spinner" id="btn-icon"></div>';
  document.getElementById('btn-text').textContent = '生成中…';

  const resultCard = document.getElementById('result-card');
  const resultText = document.getElementById('result-text');
  resultCard.classList.add('visible');
  resultText.innerHTML = '<span class="cursor"></span>';

  const resultHeader = resultCard.querySelector('.result-tag');
  resultHeader.innerHTML = '<div class="result-tag-dot" style="animation: pulse 1s ease infinite;"></div> 生成中';
  resultHeader.style.color = '#a594ff';

  const systemPrompt = `你是一位有七年經驗、操作過百萬流量、有實際變現成績的短影音操盤手。
你懂流量邏輯、演算法偏好、人性心理、商業變現。你腦中有大量爆款模型。

核心原則：
1. 口語化優先：台灣人日常講話的方式，不要書面語、不要官腔
2. 每句話都有存在的理由：30–60秒的影片，每一秒都珍貴，沒有廢話
3. 開場3秒定生死：觀眾在0.5秒內決定要不要繼續看，前三秒必須讓人停下來
4. 完播率是最重要指標：虎頭豹尾，全片零尿點，結尾急收製造「再看一次」的衝動

腳本結構：開場Hook（前3秒）→ 中段展開 → 反轉 → 結尾+CTA

開場模式選其中一種：提問式 / 爆點先行 / 創造衝突 / 破格式 / 場景帶入

輸出格式：
【影片主題】（一句話描述）
【目標秒數】30–60 秒
【開場模式】（選用的模式）

---

【開場】
（前3秒台詞）

【中段】
（核心內容台詞）

【反轉】
（出乎意料的轉折台詞）

【結尾】
（收情緒台詞 + CTA）

---

【操盤手備註】
（哪個情緒節點最關鍵、反轉邏輯說明）

只輸出台詞，不標景別，不加畫面建議。`;

  const userPrompt = `帳號類型：${selections.type}
發布平台：${selections.platform}
說話風格：${selections.style}
影片主題：${topic}

請幫我生成一個有爆款潛力的短影音腳本。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '生成失敗，請再試一次。';
    resultText.textContent = text;
    resultHeader.innerHTML = '<div class="result-tag-dot"></div> 生成完成';
    resultHeader.style.color = 'var(--green)';
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  } catch(e) {
    resultText.textContent = '發生錯誤，請稍後再試。錯誤：' + e.message;
    resultHeader.innerHTML = '<div class="result-tag-dot" style="background:#f87171;"></div> 發生錯誤';
    resultHeader.style.color = '#f87171';
  }

  btn.disabled = false;
  const spinnerEl = document.querySelector('.spinner');
  if (spinnerEl) {
    const iconSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    iconSvg.setAttribute('id', 'btn-icon');
    iconSvg.setAttribute('width', '16');
    iconSvg.setAttribute('height', '16');
    iconSvg.setAttribute('viewBox', '0 0 16 16');
    iconSvg.setAttribute('fill', 'none');
    iconSvg.innerHTML = '<path d="M8 1.5L9.5 6H14L10.5 9L11.5 13.5L8 11L4.5 13.5L5.5 9L2 6H6.5L8 1.5Z" fill="white"/>';
    spinnerEl.replaceWith(iconSvg);
  }
  document.getElementById('btn-text').textContent = '再生成一次';
}

function copyResult() {
  const text = document.getElementById('result-text').textContent;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = '已複製！';
    btn.style.color = 'var(--green)';
    btn.style.borderColor = 'rgba(74,222,128,0.4)';
    setTimeout(() => {
      btn.textContent = '複製全文';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  });
}
</script>
</body>
</html>
